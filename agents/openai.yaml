interface:
  display_name: "AI Native Loop"
  short_description: "Use when the blocker is a broken collaboration loop, not a missing one-shot answer"
  default_prompt: "Use $ai-native-loop when the user explicitly asks for it or when you have already determined the real blocker is a broken collaboration loop. Do not rely on implicit invocation for one-shot answers. Diagnose the loop, build a task packet, keep decision boundaries clear, and for medium-plus tasks end the response with a recovery block plus a local runtime capture in ~/.codex/skills/ai-native-loop/runtime/ when filesystem access is available."

policy:
  allow_implicit_invocation: false
